<script>
// Major PL/Compiler conferences with WikiCFP search terms
const CONFERENCES = [
  { abbr: "PLDI", name: "Programming Language Design and Implementation", category: "PL" },
  { abbr: "POPL", name: "Principles of Programming Languages", category: "PL" },
  { abbr: "OOPSLA", name: "Object-Oriented Programming, Systems, Languages & Applications", category: "PL" },
  { abbr: "ICFP", name: "International Conference on Functional Programming", category: "PL" },
  { abbr: "CGO", name: "Code Generation and Optimization", category: "Compilers" },
  { abbr: "CC", name: "Compiler Construction", category: "Compilers" },
  { abbr: "ASPLOS", name: "Architectural Support for Programming Languages and Operating Systems", category: "Systems" },
  { abbr: "ECOOP", name: "European Conference on Object-Oriented Programming", category: "PL" },
  { abbr: "ESOP", name: "European Symposium on Programming", category: "PL" },
  { abbr: "SAS", name: "Static Analysis Symposium", category: "Analysis" },
  { abbr: "VMCAI", name: "Verification, Model Checking, and Abstract Interpretation", category: "Verification" },
  { abbr: "CAV", name: "Computer Aided Verification", category: "Verification" },
  { abbr: "PACT", name: "Parallel Architectures and Compilation Techniques", category: "Compilers" },
  { abbr: "LCTES", name: "Languages, Compilers, Tools for Embedded Systems", category: "Compilers" },
  { abbr: "GPCE", name: "Generative Programming and Component Engineering", category: "PL" },
  { abbr: "DLS", name: "Dynamic Languages Symposium", category: "PL" },
  { abbr: "PPoPP", name: "Principles and Practice of Parallel Programming", category: "Parallel" },
  { abbr: "ISMM", name: "Memory Management", category: "Systems" },
  { abbr: "HPCA", name: "High-Performance Computer Architecture", category: "Architecture" },
  { abbr: "ISCA", name: "International Symposium on Computer Architecture", category: "Architecture" },
];

// Fallback conference dates (updated periodically)
// Format: { deadline: "YYYY-MM-DD", conference: "YYYY-MM-DD", link: "url" }
const FALLBACK_DATES = {
  "PLDI": { deadline: "2026-11-14", conference: "2027-06-15", link: "https://pldi27.sigplan.org" },
  "POPL": { deadline: "2026-07-11", conference: "2027-01-19", link: "https://popl27.sigplan.org" },
  "OOPSLA": { deadline: "2026-04-15", conference: "2026-10-20", link: "https://2026.splashcon.org/track/splash-2026-oopsla" },
  "ICFP": { deadline: "2026-02-28", conference: "2026-09-01", link: "https://icfp26.sigplan.org" },
  "CGO": { deadline: "2026-09-05", conference: "2027-03-01", link: "https://cgo-conference.github.io/cgo2027/" },
  "CC": { deadline: "2026-10-25", conference: "2027-03-01", link: "https://conf.researchr.org/home/CC-2027" },
  "ASPLOS": { deadline: "2026-08-08", conference: "2027-04-28", link: "https://asplos-conference.org" },
  "ECOOP": { deadline: "2026-01-08", conference: "2026-07-14", link: "https://2026.ecoop.org" },
  "ESOP": { deadline: "2026-10-10", conference: "2027-04-21", link: "https://etaps.org/2027/esop" },
  "CAV": { deadline: "2026-01-23", conference: "2026-07-20", link: "https://cav-conference.org" },
  "PPoPP": { deadline: "2026-08-10", conference: "2027-03-01", link: "https://ppopp27.sigplan.org" },
  "PACT": { deadline: "2026-04-09", conference: "2026-10-12", link: "https://pact2026.github.io" },
  "HPCA": { deadline: "2026-07-25", conference: "2027-02-22", link: "https://hpca-conf.org/2027/" },
  "ISCA": { deadline: "2026-11-18", conference: "2027-06-14", link: "https://iscaconf.org/isca2027/" },
};

let allConferences = [];

function calculateDaysLeft(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const targetDate = new Date(dateStr);
  const diffTime = targetDate - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  return diffDays;
}

function getCardClass(daysLeft) {
  if (daysLeft < 0) return "passed";
  if (daysLeft <= 7) return "urgent";
  if (daysLeft <= 30) return "soon";
  if (daysLeft <= 90) return "upcoming";
  return "future";
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { 
    year: 'numeric', 
    month: 'short', 
    day: 'numeric' 
  });
}

function createConferenceCard(conf) {
  const daysLeft = calculateDaysLeft(conf.deadline);
  const cardClass = getCardClass(daysLeft);
  
  let daysText;
  if (daysLeft < 0) {
    daysText = `<span class="days-left">${Math.abs(daysLeft)}</span>
                <span class="days-label">days ago</span>`;
  } else if (daysLeft === 0) {
    daysText = `<span class="days-left">TODAY!</span>
                <span class="days-label">deadline</span>`;
  } else if (daysLeft === 1) {
    daysText = `<span class="days-left">1</span>
                <span class="days-label">day left</span>`;
  } else {
    daysText = `<span class="days-left">${daysLeft}</span>
                <span class="days-label">days left</span>`;
  }
  
  return `
    <div class="conference-card ${cardClass}" data-days="${daysLeft}" data-name="${conf.abbr} ${conf.name}">
      <div class="conference-name">${conf.abbr}</div>
      <div class="conference-full-name">${conf.name}</div>
      <div class="deadline-label">Submission Deadline</div>
      <div class="deadline-date">${formatDate(conf.deadline)}</div>
      ${daysText}
      ${conf.link ? `<a href="${conf.link}" target="_blank" class="conference-link">Visit Website →</a>` : ''}
    </div>
  `;
}

async function fetchWikiCFP(confAbbr) {
  // WikiCFP doesn't have a public API, so we use the fallback data
  // In a production environment, you might scrape or use a proxy
  return null;
}

async function loadConferences() {
  const container = document.getElementById('conferenceList');
  
  try {
    // Build conference list from fallback data
    allConferences = CONFERENCES.map(conf => {
      const data = FALLBACK_DATES[conf.abbr];
      if (data) {
        return {
          ...conf,
          deadline: data.deadline,
          conference: data.conference,
          link: data.link
        };
      }
      return null;
    }).filter(Boolean);
    
    // Sort by days until deadline
    allConferences.sort((a, b) => {
      const daysA = calculateDaysLeft(a.deadline);
      const daysB = calculateDaysLeft(b.deadline);
      // Put passed conferences at the end
      if (daysA < 0 && daysB >= 0) return 1;
      if (daysB < 0 && daysA >= 0) return -1;
      return daysA - daysB;
    });
    
    renderConferences(allConferences);
    
    document.getElementById('lastUpdated').textContent = 
      `Last updated: ${new Date().toLocaleDateString()}. Dates are approximate - always verify on official websites.`;
      
  } catch (error) {
    container.innerHTML = `
      <div class="error">
        <strong>Error loading conferences.</strong><br>
        ${error.message}
      </div>
    `;
  }
}

function renderConferences(conferences) {
  const container = document.getElementById('conferenceList');
  if (conferences.length === 0) {
    container.innerHTML = '<p style="text-align: center; color: #888;">No conferences found matching your criteria.</p>';
    return;
  }
  container.innerHTML = conferences.map(createConferenceCard).join('');
}

function filterConferences(filter) {
  let filtered = allConferences;
  
  switch(filter) {
    case 'urgent':
      filtered = allConferences.filter(c => {
        const days = calculateDaysLeft(c.deadline);
        return days >= 0 && days <= 7;
      });
      break;
    case 'soon':
      filtered = allConferences.filter(c => {
        const days = calculateDaysLeft(c.deadline);
        return days >= 0 && days <= 30;
      });
      break;
    case 'upcoming':
      filtered = allConferences.filter(c => {
        const days = calculateDaysLeft(c.deadline);
        return days >= 0 && days <= 90;
      });
      break;
    case 'active':
      filtered = allConferences.filter(c => calculateDaysLeft(c.deadline) >= 0);
      break;
  }
  
  return filtered;
}

// Search functionality
document.getElementById('searchBox').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase();
  const filtered = allConferences.filter(conf => 
    conf.abbr.toLowerCase().includes(query) || 
    conf.name.toLowerCase().includes(query) ||
    (conf.category && conf.category.toLowerCase().includes(query))
  );
  renderConferences(filtered);
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    
    const filter = this.dataset.filter;
    const filtered = filterConferences(filter);
    renderConferences(filtered);
    
    // Clear search
    document.getElementById('searchBox').value = '';
  });
});

// Load on page ready
document.addEventListener('DOMContentLoaded', loadConferences);
// Also try loading immediately in case DOM is already ready
if (document.readyState !== 'loading') {
  loadConferences();
}
</script>
